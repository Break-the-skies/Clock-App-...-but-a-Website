<!DOCTYPE html>
<head>
    <title>Clocks - Timer Page</title>
    <link rel="stylesheet" href="Timer CSS.css">
    <script src="Timer JS.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1 id="title">Welcome to the Timer!</h1>
    <p>Honestly the name should be self-explantory.</p>
    <br>
    <div id="Timer Duration"></div>
       <form id="timer_length" action="Timer JS.js" method="post">
            <label for="Hours">Hours?:></label>
            <input type="number" id="Hours" name="hours" value="0" min="0" step="1">
            <label for="Minutes">Minutes?:></label>
            <input type="number" id="Minutes" name="minutes" min="0" max="59" value="0" step="1">
            <label for="Seconds">Seconds?:></label>
            <input type="number" id="Seconds" name="seconds" min="0" max="59" value="0" step="1" required>
            <input type="Submit" value="Start Timer" id="Timer Start" onclick="startTimer()">
        </form>
    </div>
    <br>
    <div id="Timer">
        <h1 id="Timer Text" style="color:rgba(60,60,60,0)"></h1>
        <button id="Pause" onclick="pauseTimer()" style="color:rgba(60,60,60,0)">Pause</button>
        <button id="Stop" onclick="stopTimer()" style="color:rgba(60,60,60,0)">Stop</button>
        <button id="Resume" onclick="resumeTimer()" style="color:rgba(60,60,60,0)">Resume</button>
    </div>
</body>
